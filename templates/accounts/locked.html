{% extends 'base.html' %}
{% block title %}Account Locked{% endblock %}
{% block auth_content %}
<div class="auth-card text-center">
  <i class="bi bi-shield-lock-fill" style="font-size:3rem;color:#ef4444"></i>
  <h4 class="mt-3 fw-bold" style="color:var(--text)">Account Locked</h4>
  <p style="color:var(--muted)">Too many failed attempts.<br>Please wait 1 hour and try again.</p>
  <a href="{% url 'login' %}" class="btn btn-outline-gold mt-2">Back to Sign In</a>
</div>
{% endblock %}
